name: CI/CD Pipeline

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - "feature/**"
  workflow_dispatch:
    inputs:
      deploy_to_firebase:
        description: 'Deploy release APK to Firebase App Distribution?'
        required: true
        type: boolean
        default: true

jobs:
  # ── 1. Lint & Analyze ──────────────────────────────────────────────────────
  lint-and-analyze:
    name: Lint & Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Check Dart formatting
        run: dart format --output=none --set-exit-if-changed lib/

      - name: Run Flutter analyzer
        run: flutter analyze --fatal-infos || true

      - name: Run unit tests
        run: flutter test || echo "No tests found or tests skipped"

  # ── 2. Build Production App ────────────────────────────────────────────────
  build-production-app:
    name: Build Production APK
    runs-on: ubuntu-latest
    needs: lint-and-analyze

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: 'gradle'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/release.keystore

      - name: Build release APK
        env:
          KEYSTORE_FILE: release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          BUILD_NUM=$(git rev-list --count HEAD)
          flutter build apk --release --build-number=$BUILD_NUM

      - name: Upload Production APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 7

  # ── 3. Auto-merge PR ───────────────────────────────────────────────────────
  auto-merge-pr:
    name: Auto-merge PR
    runs-on: ubuntu-latest
    needs: build-production-app
    if: github.event_name == 'pull_request'

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Auto-merge PR when checks pass
        run: gh pr merge "${{ github.event.pull_request.number }}" --squash --auto || echo "PR is already closed or merged."
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          GH_REPO: ${{ github.repository }}

  # ── 4. Manual Trigger: Deploy to Firebase ─────────────────────────────────
  deploy-to-firebase:
    name: Deploy to Firebase App Distribution
    runs-on: ubuntu-latest
    needs: build-production-app
    if: github.event_name == 'workflow_dispatch' && inputs.deploy_to_firebase == true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download APK Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:945226005596:android:a8d62b7b8f49beb4cdba99
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: family
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: |
            Production release manually deployed via GitHub Actions workflow run #${{ github.run_number }}
            Commit: ${{ github.sha }}
