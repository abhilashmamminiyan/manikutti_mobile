name: Build & Distribute to Firebase

on:
  push:
    branches:
      - main

jobs:
  distribute:
    name: Build APK & Upload to Firebase
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java (required for Android builds) ─────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 3. Set up Flutter ─────────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable
          cache: true

      # ── 5. Install dependencies ────────────────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 6. Build release APK ───────────────────────────────────────────────────
      # Build number = GitHub Actions run number (auto-increments on every push)
      # Version name stays as defined in pubspec.yaml
      - name: Build release APK
        run: |
          flutter build apk --release \
            --build-number=${{ github.run_number }}

      # ── 7. Upload to Firebase App Distribution ─────────────────────────────────
      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: 1:945226005596:android:a8d62b7b8f49beb4cdba99
          serviceCredentialsFileContent: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          groups: family
          file: build/app/outputs/flutter-apk/app-release.apk
          releaseNotes: |
            Build #${{ github.run_number }} — ${{ github.event.head_commit.message }}
            Commit: ${{ github.sha }}
