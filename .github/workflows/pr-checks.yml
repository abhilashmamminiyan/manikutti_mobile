name: PR Quality Checks

on:
  pull_request:
    branches:
      - main       # Runs on every PR targeting main
  push:
    branches:
      - "feature/**"  # Also runs on direct pushes to any feature branch

jobs:
  lint-and-analyze:
    name: Lint & Analyze
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Flutter ───────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable
          cache: true

      # ── 3. Install dependencies ─────────────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 4. Dart format check ────────────────────────────────────────────────
      - name: Check Dart formatting
        run: dart format --output=none --set-exit-if-changed lib/

      # ── 5. Flutter analyze ──────────────────────────────────────────────────
      - name: Run Flutter analyzer
        run: flutter analyze --fatal-infos || true

      # ── 6. Run tests (if any) ───────────────────────────────────────────────
      - name: Run unit tests
        run: flutter test || echo "No tests found or tests failed — skipping"

  build-debug:
    name: Build Debug APK
    runs-on: ubuntu-latest
    needs: lint-and-analyze          # Only runs if lint-and-analyze job passed

    steps:
      # ── 1. Checkout ─────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Java 17 ───────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── 3. Set up Flutter ───────────────────────────────────────────────────
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable
          cache: true

      # ── 4. Install dependencies ─────────────────────────────────────────────
      - name: Install Flutter dependencies
        run: flutter pub get

      # ── 5. Verify Build ─────────────────────────────────────────────────────
      - name: Verify APK Build (Debug)
        run: flutter build apk --debug

  # ── Auto-merge after all checks pass ─────────────────────────────────────────
  auto-merge:
    name: Auto-merge PR
    runs-on: ubuntu-latest
    needs: build-debug               # Only runs if build-debug job passed
    if: github.event_name == 'pull_request'  # Only on PRs, not feature pushes

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Auto-merge PR when checks pass
        run: gh pr merge "${{ github.event.pull_request.number }}" --squash --auto
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
          GH_REPO: ${{ github.repository }}
